server:
  port: 9000

spring:
  datasource:
    url: jdbc:mysql://<hostname>:<port>/<database_name>
    driverClassName: com.mysql.cj.jdbc.Driver
    username: <your_mysql_username>
    password: <your_mysql_password>
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update